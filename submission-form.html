<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2026 김치 리더스 아카데미 실습 수업 — 레시피 제출 양식</title>
<style>
  :root{ --line:#2b2b2b; --beige:#F4E2C6; --ink:#1c1a18; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:#e9e9e9; color:var(--ink);
    font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",sans-serif; }

  /* 화면 표시용 */
  .bar{ text-align:center; padding:14px; }
  .bar button{ font:inherit; font-weight:700; font-size:14px; cursor:pointer;
    background:#C84E6C; color:#fff; border:none; border-radius:8px; padding:10px 22px; }
  .bar span{ display:block; color:#666; font-size:12px; margin-top:8px; }

  .page{ width:210mm; min-height:297mm; margin:0 auto 20px; background:#fff;
    padding:14mm 12mm; }

  .title{ border:1.5px solid var(--line); background:var(--beige); text-align:center;
    font-size:21px; font-weight:800; letter-spacing:2px; padding:9px 0; }

  table{ width:100%; border-collapse:collapse; table-layout:fixed; }
  .top{ border:1.5px solid var(--line); border-top:none; }
  .top td{ vertical-align:top; padding:0; border:1px solid var(--line); }

  .hdr{ background:var(--beige); text-align:center; font-weight:700; font-size:13px;
    padding:5px 0; border-bottom:1px solid var(--line); }
  .photo{ height:200px; display:flex; align-items:center; justify-content:center;
    color:#555; font-size:13px; }

  .name{ font-size:15px; font-weight:700; padding:14px 12px 16px; }
  .name .u{ display:inline-block; min-width:62%; border-bottom:1.4px solid var(--line);
    height:1.1em; vertical-align:bottom; }
  .intro{ padding:10px 12px; font-size:12.5px; line-height:2.0; min-height:120px; }
  .intro .lead{ margin:0 0 6px; }
  .intro ol{ margin:6px 0 0; padding-left:18px; }
  .intro li{ margin-bottom:2px; }

  /* 하단 그리드 */
  .grid{ border:1.5px solid var(--line); border-top:none; }
  .grid th,.grid td{ border:1px solid var(--line); }
  .grid th{ background:var(--beige); font-size:13px; font-weight:700; padding:5px 0; }
  .grid td{ height:27px; }
  .sec{ font-weight:700; font-size:13px; padding-left:8px; }
  .recipe{ vertical-align:top; }
  .recipe .inner{ padding:8px 10px; font-size:13px; line-height:2.1; height:100%; }

  /* 인쇄 */
  @page{ size:A4 portrait; margin:10mm; }
  @media print{
    html,body{ background:#fff; }
    .bar{ display:none; }
    .page{ width:auto; min-height:auto; margin:0; padding:0; }
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>

<div class="bar">
  <button onclick="window.print()">🖨 인쇄 / PDF 저장</button>
  <span>Ctrl+P(⌘+P) → 용지 A4 · 배경 그래픽 켜기 권장</span>
</div>

<div class="page">
  <div class="title">2026 김치 리더스 아카데미 실습 수업</div>

  <table class="top">
    <colgroup><col style="width:40%"><col style="width:60%"></colgroup>
    <tr>
      <!-- 좌: 사진 -->
      <td>
        <div class="hdr">사진 (Food image)</div>
        <div class="photo">사진첨부</div>
      </td>
      <!-- 우: 김치명 + 소개 요약 -->
      <td style="padding:0">
        <div class="name">김치명 : <span class="u"></span></div>
        <div class="hdr" style="border-top:1px solid var(--line)">제출작 소개 요약</div>
        <div class="intro">
          <p class="lead">하기의 사항을 고려하여 소개 요약서 작성</p>
          <ol>
            <li>김치의 레시피가 만들어지게 된 이유, 배경</li>
            <li>김치에 얽힌 추억이나 이야기</li>
            <li>김치의 특징과 가치에 대하여 등</li>
          </ol>
        </div>
      </td>
    </tr>
  </table>

  <table class="grid">
    <colgroup>
      <col style="width:18%"><col style="width:12%"><col style="width:10%"><col style="width:60%">
    </colgroup>
    <thead>
      <tr><th>식재료</th><th>분량</th><th>단위</th><th>조리법(Recipe)</th></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<script>
  // 좌측 식재료 표(재료/양념/풀) + 우측 조리법(rowspan) 자동 생성
  const sections = [["재료",4],["양념",9],["풀",2]];
  const rows = [];
  sections.forEach(([label,n])=>{
    rows.push({sec:label});
    for(let i=0;i<n;i++) rows.push({});
  });
  const total = rows.length;
  const tb = document.getElementById("body");
  rows.forEach((r,idx)=>{
    const tr = document.createElement("tr");
    if(r.sec){
      tr.innerHTML = '<td class="sec">'+r.sec+'</td><td></td><td></td>';
    } else {
      tr.innerHTML = '<td></td><td></td><td></td>';
    }
    if(idx===0){
      const rc = document.createElement("td");
      rc.className = "recipe";
      rc.rowSpan = total;
      rc.innerHTML = '<div class="inner">1.</div>';
      tr.appendChild(rc);
    }
    tb.appendChild(tr);
  });
</script>
</body>
</html>
